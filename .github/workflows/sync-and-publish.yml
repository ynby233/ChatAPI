name: Sync Upstream and Publish Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: "23 19 * * *"
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/sync-and-publish.yml
      - backend/**
      - frontend/**

permissions:
  contents: write
  packages: write

concurrency:
  group: sync-and-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream main
        if: github.event_name != 'push'
        run: |
          git remote add upstream https://github.com/zyf2007/ChatAPI.git || true
          git fetch upstream main
          git merge --no-edit upstream/main
          if ! git diff --quiet origin/main..HEAD; then
            git push origin HEAD:main
          fi

      - name: Set image tags
        id: meta
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/chatapi"
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${image}:latest,${image}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image name
        run: |
          echo "Published ${{ steps.meta.outputs.image }}:latest"
