user azureuser;
daemon off;
error_log /dev/stdout info;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stdout warn;

    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path /tmp/nginx-proxy;
    fastcgi_temp_path /tmp/nginx-fastcgi;
    uwsgi_temp_path /tmp/nginx-uwsgi;
    scgi_temp_path /tmp/nginx-scgi;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        text/css
        text/plain
        text/xml
        image/svg+xml;

    server {
        listen 443 ssl;
        server_name api.kirari.fun;

        ssl_certificate /home/azureuser/Projects/ssl/api.kirari.fun_bundle.pem;
        ssl_certificate_key /home/azureuser/Projects/ssl/api.kirari.fun.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://127.0.0.1:41707;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    server {
        listen 80;
        server_name api.kirari.fun;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name sg.kirari.fun;

        ssl_certificate /home/azureuser/Projects/ssl/sg.kirari.fun_bundle.pem;
        ssl_certificate_key /home/azureuser/Projects/ssl/sg.kirari.fun.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /home/azureuser/Projects/chatapi/dist;
        index index.html;

        location = /api {
            return 301 /api/;
        }

        location ^~ /api/ {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
            expires 7d;
        }
    }

    server {
        listen 80;
        server_name sg.kirari.fun;
        return 301 https://$host$request_uri;
    }
}
